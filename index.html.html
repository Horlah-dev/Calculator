<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>

    <div id="calculator">

    <header>
    <div class="top-icons">
    <a href="#" class="history">⏱</a>
    <a href="#" class="basic">🧮</a>
    </div>
    </header>
    
      <div class="display" id="display">0</div>

      <div class="buttons">
        <button class="gray" onclick="deleteLast()">⌫</button>
        <button class="gray" onclick="clearAll()">AC</button>
        <button class="gray" onclick="percent()">%</button>
        <button class="orange" onclick="appendOperator('/')">÷</button>

        <button class="gray" onclick="appendNumber('7')">7</button>
        <button class="gray" onclick="appendNumber('8')">8</button>
        <button class="gray" onclick="appendNumber('9')">9</button>
        <button class="orange" onclick="appendOperator('*')">x</button>

        <button class="gray" onclick="appendNumber('4')">4</button>
        <button class="gray" onclick="appendNumber('5')">5</button>
        <button class="gray" onclick="appendNumber('6')">6</button>
        <button class="orange" onclick="appendOperator('-')">-</button>

        <button class="gray" onclick="appendNumber('1')">1</button>
        <button class="gray" onclick="appendNumber('2')">2</button>
        <button class="gray" onclick="appendNumber('3')">3</button>
        <button class="orange" onclick="appendOperator('+')">+</button>

        <button class="gray" onclick="appendOperator('(-)')">-/-</button>
        <button class="gray" onclick="appendNumber('0')">0</button>
        <button class="gray" onclick="appendNumber('.')">.</button>
        <button class="orange" onclick="calculate()">=</button>
      </div>
     
     </div>
    <script type="text/JavaScript" src="cal.js"></script>

</body>
</html>
